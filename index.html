<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CHAOS LIVE</title>
</head>
<body>

<h1>CHAOS LIVE</h1>

<div id="result">로딩중...</div>

<script>

fetch("https://api.wc3stats.com/gamelist")
.then(r => r.json())
.then(data => {

    document.getElementById("result").innerHTML =
        "성공 : " + data.body.length + "개 방 발견";

})
.catch(err => {

    document.getElementById("result").innerHTML =
        "실패 : " + err;

});

</script>

</body>
</html>
