<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAOS LIVE</title>

<style>
*{box-sizing:border-box}
:root{
  --bg:#07090f;
  --panel:#111724;
  --panel2:#151c2c;
  --line:#283552;
  --text:#f4f7ff;
  --sub:#8f9bb3;
  --blue:#6aa8ff;
  --green:#66ff9a;
  --yellow:#ffd86a;
  --orange:#ff9f43;
  --red:#ff5d6c;
  --purple:#b784ff;
}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 15% 0%,rgba(58,94,180,.35),transparent 34%),
    radial-gradient(circle at 90% 10%,rgba(122,70,255,.18),transparent 30%),
    linear-gradient(180deg,#080b12,#05060a);
  color:var(--text);
  font-family:Arial,"Noto Sans KR",sans-serif;
}
.wrap{max-width:1180px;margin:0 auto;padding:32px 18px 70px}
.header{display:flex;justify-content:space-between;gap:20px;align-items:flex-end;margin-bottom:22px}
.logo{font-size:44px;font-weight:950;letter-spacing:-1.5px}
.logo span{color:var(--blue)}
.sub{color:var(--sub);margin-top:8px}
.live-dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 18px var(--green);margin-right:9px}
.updated{color:var(--sub);font-size:14px;text-align:right}

.hero{
  display:grid;
  grid-template-columns:1.4fr .9fr;
  gap:16px;
  margin-bottom:16px;
}
.hot{
  position:relative;
  overflow:hidden;
  background:linear-gradient(135deg,rgba(32,45,75,.95),rgba(13,17,27,.96));
  border:1px solid rgba(106,168,255,.34);
  border-radius:26px;
  padding:24px;
  box-shadow:0 24px 70px rgba(0,0,0,.35);
}
.hot:before{
  content:"";
  position:absolute;
  inset:-60px -80px auto auto;
  width:260px;height:260px;border-radius:50%;
  background:rgba(106,168,255,.16);
  filter:blur(4px);
}
.hot-label{color:var(--yellow);font-weight:900;font-size:14px;margin-bottom:12px}
.hot-version{font-size:42px;font-weight:950;color:var(--blue);letter-spacing:-1px}
.hot-name{font-size:21px;font-weight:800;margin-top:10px}
.hot-host{font-size:18px;margin-top:16px;color:#fff}
.hot-bottom{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-top:22px}
.hot-count{font-size:44px;font-weight:950;color:var(--green);white-space:nowrap}
.hot-time{color:var(--sub);font-size:14px}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.stat{
  background:rgba(17,23,36,.82);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  padding:18px;
}
.stat-label{color:var(--sub);font-size:13px}
.stat-value{font-size:32px;font-weight:950;margin-top:8px}

.toolbar{
  display:flex;
  gap:10px;
  background:rgba(10,13,20,.72);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  padding:12px;
  margin:18px 0;
}
.search{
  flex:1;
  background:#070a11;
  border:1px solid #27324a;
  color:#fff;
  border-radius:15px;
  padding:15px;
  font-size:15px;
  outline:none;
}
.btn{
  border:1px solid #344463;
  background:#141d2f;
  color:#dce7ff;
  border-radius:15px;
  padding:0 18px;
  font-weight:800;
  cursor:pointer;
}

.version-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tab{
  border:1px solid #2c3a58;
  background:#101725;
  color:#b7c6e8;
  border-radius:999px;
  padding:9px 13px;
  font-size:13px;
}
.tab strong{color:#fff}

.rooms{display:grid;gap:12px}
.room{
  position:relative;
  overflow:hidden;
  background:linear-gradient(135deg,rgba(22,29,45,.98),rgba(11,15,24,.98));
  border:1px solid rgba(106,168,255,.18);
  border-radius:24px;
  padding:20px;
  box-shadow:0 16px 48px rgba(0,0,0,.25);
}
.room:before{
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;
  width:5px;
  background:var(--green);
}
.room.mid:before{background:var(--blue)}
.room.near:before{background:var(--orange)}
.room.full:before{background:var(--red)}

.room-head{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}
.version{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:30px;
  font-weight:950;
  color:var(--blue);
  letter-spacing:-.5px;
}
.version.dc{color:var(--purple)}
.room-name{font-size:19px;font-weight:850;margin-top:10px;color:#f6f8ff}
.host{font-size:22px;font-weight:950;margin-top:16px}
.created{color:var(--sub);font-size:14px;margin-top:10px}
.players{text-align:right}
.count{font-size:40px;font-weight:950;white-space:nowrap}
.count.open{color:var(--green)}
.count.mid{color:var(--blue)}
.count.near{color:var(--orange)}
.count.full{color:var(--red)}
.bar{
  width:170px;
  height:9px;
  background:#20283a;
  border-radius:999px;
  margin-top:12px;
  overflow:hidden;
}
.fill{
  height:100%;
  border-radius:999px;
  background:var(--green);
}
.fill.mid{background:var(--blue)}
.fill.near{background:var(--orange)}
.fill.full{background:var(--red)}
.map{font-size:13px;color:#66728d;margin-top:14px;word-break:break-all}
.empty,.error{
  background:#111724;
  border:1px solid #283552;
  border-radius:20px;
  padding:24px;
  color:#b8c3da;
}

@media(max-width:820px){
  .header{display:block}
  .updated{text-align:left;margin-top:12px}
  .hero{grid-template-columns:1fr}
  .logo{font-size:36px}
  .hot-version{font-size:34px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .toolbar{display:block}
  .btn{width:100%;height:48px;margin-top:10px}
  .room-head{display:block}
  .players{text-align:left;margin-top:16px}
  .bar{width:100%}
}
</style>
</head>

<body>
<div class="wrap">

  <div class="header">
    <div>
      <div class="logo"><span class="live-dot"></span>CHAOS <span>LIVE</span></div>
      <div class="sub">Warcraft III Reforged · WCC CHAOS_B1_A1 Room Tracker</div>
    </div>
    <div id="updated" class="updated">불러오는 중...</div>
  </div>

  <div class="hero">
    <section id="hotRoom" class="hot"></section>

    <section class="stats">
      <div class="stat">
        <div class="stat-label">현재 방</div>
        <div id="totalRooms" class="stat-value">-</div>
      </div>
      <div class="stat">
        <div class="stat-label">전체 인원</div>
        <div id="totalPlayers" class="stat-value">-</div>
      </div>
      <div class="stat">
        <div class="stat-label">FX 방</div>
        <div id="fxRooms" class="stat-value">-</div>
      </div>
      <div class="stat">
        <div class="stat-label">DC 방</div>
        <div id="dcRooms" class="stat-value">-</div>
      </div>
    </section>
  </div>

  <div class="toolbar">
    <input id="search" class="search" placeholder="방제 / 방장 / 맵 버전 검색">
    <button id="sortBtn" class="btn">인원 많은 순</button>
  </div>

  <div id="tabs" class="version-tabs"></div>
  <div id="rooms" class="rooms"></div>

</div>

<script>
const API = "https://api.wc3stats.com/gamelist";
let allRooms = [];
let sortMode = "players";

function cleanMapName(map){
  return (map || "").replace(/\.w3x$/i,"").replace(/\.w3m$/i,"");
}

function getVersion(map){
  const name = cleanMapName(map);
  const upper = name.toUpperCase();

  if(upper.includes("FX")){
    const m = name.match(/fx\s*([0-9.]+)/i);
    return m ? `FX ${m[1]}` : "FX";
  }

  if(upper.includes("DC")) return "DC";

  const wcc = name.match(/WCC[_\s-]*([A-Za-z0-9.]+)/i);
  if(wcc) return `WCC ${wcc[1]}`;

  return "CHAOS";
}

function versionClass(version){
  return version.includes("DC") ? "dc" : "";
}

function state(room){
  const taken = Number(room.slotsTaken || 0);
  const total = Number(room.slotsTotal || 12);
  const left = total - taken;

  if(taken >= total) return "full";
  if(left <= 2) return "near";
  if(taken >= Math.ceil(total * .45)) return "mid";
  return "open";
}

function timeAgo(ts){
  if(!ts) return "생성시간 알 수 없음";

  const created = Number(ts) * 1000;
  const diff = Math.max(0, Date.now() - created);
  const sec = Math.floor(diff / 1000);
  const min = Math.floor(sec / 60);
  const hour = Math.floor(min / 60);

  if(sec < 10) return "방금 생성";
  if(sec < 60) return `${sec}초 전 생성`;
  if(min < 60) return `${min}분 전 생성`;
  return `${hour}시간 전 생성`;
}

function renderHotRoom(rooms){
  const hot = rooms[0];
  const el = document.getElementById("hotRoom");

  if(!hot){
    el.innerHTML = `
      <div class="hot-label">🔥 HOT ROOM</div>
      <div class="hot-version">대기중</div>
      <div class="hot-name">현재 표시할 방이 없습니다.</div>
    `;
    return;
  }

  const version = getVersion(hot.map);

  el.innerHTML = `
    <div class="hot-label">🔥 HOT ROOM</div>
    <div class="hot-version">${version}</div>
    <div class="hot-name">${hot.name || "제목 없음"}</div>
    <div class="hot-host">👤 ${hot.host || "-"}</div>
    <div class="hot-bottom">
      <div>
        <div class="hot-time">${timeAgo(hot.created)}</div>
        <div class="map">${cleanMapName(hot.map)}</div>
      </div>
      <div class="hot-count">${hot.slotsTaken}/${hot.slotsTotal}</div>
    </div>
  `;
}

function renderTabs(rooms){
  const counts = {};
  rooms.forEach(r => {
    const v = getVersion(r.map);
    counts[v] = (counts[v] || 0) + 1;
  });

  document.getElementById("tabs").innerHTML =
    Object.entries(counts)
      .sort((a,b) => b[1] - a[1])
      .map(([v,c]) => `<div class="tab">${v} <strong>${c}</strong></div>`)
      .join("");
}

function render(){
  const q = document.getElementById("search").value.toLowerCase();

  let rooms = allRooms.filter(room => {
    const text = `${room.name} ${room.host} ${room.map} ${getVersion(room.map)}`.toLowerCase();
    return text.includes(q);
  });

  if(sortMode === "players"){
    rooms.sort((a,b) => b.slotsTaken - a.slotsTaken);
  }else{
    rooms.sort((a,b) => b.created - a.created);
  }

  renderHotRoom(rooms);
  renderTabs(allRooms);

  if(!rooms.length){
    document.getElementById("rooms").innerHTML =
      `<div class="empty">현재 표시할 CHAOS_B1_A1 방이 없습니다.</div>`;
    return;
  }

  document.getElementById("rooms").innerHTML = rooms.map(room => {
    const s = state(room);
    const version = getVersion(room.map);
    const percent = Math.min(100, Math.round((room.slotsTaken / room.slotsTotal) * 100));

    return `
      <article class="room ${s}">
        <div class="room-head">
          <div>
            <div class="version ${versionClass(version)}">${version}</div>
            <div class="room-name">${room.name || "제목 없음"}</div>
            <div class="host">👤 ${room.host || "-"}</div>
            <div class="created">🕒 ${timeAgo(room.created)}</div>
            <div class="map">${cleanMapName(room.map)}</div>
          </div>

          <div class="players">
            <div class="count ${s}">${room.slotsTaken}/${room.slotsTotal}</div>
            <div class="bar">
              <div class="fill ${s}" style="width:${percent}%"></div>
            </div>
          </div>
        </div>
      </article>
    `;
  }).join("");
}

async function loadRooms(){
  try{
    const res = await fetch(API);
    const data = await res.json();

    allRooms = data.body
      .filter(room =>
        room.map &&
        room.map.toUpperCase().startsWith("CHAOS_B1_A1_")
      )
      .sort((a,b) => b.slotsTaken - a.slotsTaken);

    const fx = allRooms.filter(r => getVersion(r.map).includes("FX")).length;
    const dc = allRooms.filter(r => getVersion(r.map).includes("DC")).length;
    const totalPlayers = allRooms.reduce((sum,r) => sum + Number(r.slotsTaken || 0), 0);

    document.getElementById("totalRooms").textContent = allRooms.length;
    document.getElementById("totalPlayers").textContent = totalPlayers;
    document.getElementById("fxRooms").textContent = fx;
    document.getElementById("dcRooms").textContent = dc;

    document.getElementById("updated").textContent =
      new Date().toLocaleTimeString("ko-KR") + " 갱신 · 30초 자동";

    render();

  }catch(err){
    document.getElementById("rooms").innerHTML =
      `<div class="error">데이터를 불러오지 못했습니다.<br>${err}</div>`;
  }
}

document.getElementById("search").addEventListener("input", render);

document.getElementById("sortBtn").addEventListener("click", () => {
  sortMode = sortMode === "players" ? "new" : "players";
  document.getElementById("sortBtn").textContent =
    sortMode === "players" ? "인원 많은 순" : "최근 생성 순";
  render();
});

loadRooms();
setInterval(loadRooms, 30000);
</script>

</body>
</html>
